name: CI PROD
on:
  push:
    branches: [ main ]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: main
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
  build-backend:
    if: needs.changes.outputs.backend == 'true'
    name: Build Backend
    runs-on:  ubuntu-latest
    needs: changes
    strategy:
      fail-fast: true
      matrix:
        php-versions: [ '8.1.18' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build & Push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/clapiers-admin:stable-backend
          sbom: true
          provenance: true
          network: host

  build-frontend:
    if: needs.changes.outputs.frontend == 'true'
    name: Build Frontend
    runs-on:  ubuntu-latest
    needs: changes
    strategy:
      fail-fast: true
      matrix:
        php-versions: [ '8.1.18' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Setup env frontend
        run: |
          echo 'NUXT_PUBLIC_API_BASE=https://clapiersvb.fr/api' > frontend/.env
          echo 'NUXT_PUBLIC_RECAPTCHA_SITE_KEY=6LfHh-4sAAAAAEX2r_rk4ivvEUvxxYQ1ut9etJCc' >> frontend/.env
      - name: Build & Push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          file: frontend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/clapiers-admin:stable-frontend
          sbom: true
          provenance: true
          network: host


  sync-builds:
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-backend
      - build-frontend
    if: always() && (
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true'
      )
    steps:
      - name: Sync point
        run: echo "All required builds finished"



  deploy-frontend:
    name: Deploy Repair Network
    runs-on:  ubuntu-latest
    needs:
      - sync-builds
      - changes
    strategy:
      fail-fast: true
      matrix:
        php-versions: [ '8.1.18' ]
    if: always() && needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_SECRET }}

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/clapieradmin-frontend -n clapier-admin-prod

  deploy-backend:
    name: Deploy Repair Network
    runs-on:  ubuntu-latest
    needs:
      - sync-builds
      - changes
    permissions:
      id-token: write
      contents: write
    strategy:
      fail-fast: true
      matrix:
        php-versions: [ '8.1.18' ]
    if: always() && needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_SECRET }}

      - name: Rollout restart
        run: kubectl rollout restart deployment/clapieradmin-backend-php -n clapier-admin-prod

      - name: Wait for rollout
        run: kubectl rollout status deployment/clapieradmin-backend-php -n clapier-admin-prod

      - name: Run command in pod
        run: |
          POD=$(kubectl get pods -n clapier-admin-prod -l app=clapieradmin-backend-php | grep Running | awk '{print $1}' | head -n1)
          kubectl exec -n clapier-admin-prod $POD -- bin/console doctrine:migrations:migrate --no-interaction