name: CI PROD
on:
  push:
    branches: [ main ]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: main
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
  build-backend:
    if: needs.changes.outputs.backend == 'true'
    name: Build Backend
    runs-on:  ubuntu-latest
    needs: changes
    strategy:
      fail-fast: true
      matrix:
        php-versions: [ '8.1.18' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build & Push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/clapiers-admin:stable-backend
          sbom: true
          provenance: true
          network: host

  build-frontend:
    if: needs.changes.outputs.frontend == 'true'
    name: Build Frontend
    runs-on:  ubuntu-latest
    needs: changes
    strategy:
      fail-fast: true
      matrix:
        php-versions: [ '8.1.18' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Setup env frontend
        run: |
          echo 'NUXT_PUBLIC_API_BASE=https://clapiersvb.fr/api' > frontend/.env
      - name: Build & Push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          file: frontend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/clapiers-admin:stable-frontend
          sbom: true
          provenance: true
          network: host